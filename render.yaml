services:
  - type: web
    name: musiana-backend
    runtime: node
    rootDir: backend
    buildCommand: "mkdir -p bin && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o bin/yt-dlp && chmod a+rx bin/yt-dlp && npm install"
    startCommand: "node server.js"
    envVars:
      - key: NODE_ENV
        value: production
